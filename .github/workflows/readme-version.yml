name: README verzió

on:
  push:
    branches:
      - main

jobs:
  sync-readme-version:
    # head_commit néha null; detached HEAD nélküli checkout + explicit push → stabil futás
    if: ${{ github.event_name == 'push' && (github.event.head_commit == null || !contains(github.event.head_commit.message, 'chore(readme): verzió')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ref: ág név → nem detached HEAD, különben a git push gyakran elbukik
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Python zoneinfo „Europe/Budapest” névhez IANA zónaadat kell (néha hiányzik a slim image-ből).
      - name: tzdata (IANA időzónák)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tzdata

      - name: README Verziószám sor frissítése
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/update_readme_version.py

      - name: Commit és push (ha változott)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "README változatlan."
            exit 0
          fi
          git add README.md
          git commit -m "chore(readme): verzió"
          git push origin "HEAD:${GITHUB_REF_NAME}"
